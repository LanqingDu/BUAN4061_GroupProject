<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUAN 4061 – Project Collaboration Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #2563eb;
    --bg: #f8fafc;
    --text-main: #1e293b;
    --accent-yellow: #fef9c3;
    --border: #e2e8f0;
    --danger: #ef4444;
}
body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); display:flex; flex-direction:column; align-items:center; }
header { width:100%; background:white; padding:1.5rem 0; border-bottom:1px solid var(--border); text-align:center; }
.main-content { max-width:1400px; width:95%; margin:2rem 0; }

#sync-bar { display:flex; justify-content:space-between; margin-bottom:1rem; }
#sync-status { font-size:0.8rem; color:#94a3b8; }
#sync-status.syncing { color:#2563eb; }
#sync-status.error { color:#ef4444; }
#sync-status.success { color:#16a34a; }

.proposal-card { background:white; padding:2rem; border-radius:12px; margin-bottom:2rem; border:1px solid var(--border); }
.grid-form { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1.5rem; }
.full-width { grid-column: span 3; }

input, textarea { width:100%; padding:0.75rem; border:1px solid var(--border); border-radius:6px; }

.btn-main { background:var(--primary); color:white; border:none; padding:0.75rem 2rem; border-radius:6px; cursor:pointer; }

.table-container { background:white; border-radius:12px; overflow-x:auto; border:1px solid var(--border); }
table { width:100%; border-collapse:collapse; }
td, th { padding:1rem; border-bottom:1px solid var(--border); }

#loading-overlay {
    position:fixed; inset:0; background:rgba(248,250,252,0.85);
    display:flex; align-items:center; justify-content:center;
}
#loading-overlay.hidden { display:none; }
</style>
</head>

<body>

<div id="loading-overlay">
    <div id="loading-msg">Loading...</div>
</div>

<header>
    <h1>Project Collaboration Portal</h1>
</header>

<div class="main-content">

<!-- ✅ FIXED: sync status added -->
<div id="sync-bar">
    <div id="sync-status">Initializing...</div>
</div>

<div class="proposal-card">
    <div class="grid-form">
        <input id="leaderName" placeholder="Leader Name">
        <input id="leaderEmail" placeholder="Email">
        <input id="projName" placeholder="Project Name">
        <textarea id="projDesc" class="full-width"></textarea>
    </div>

    <!-- ✅ FIXED: publish-btn id added -->
    <button id="publish-btn" class="btn-main" onclick="addProject()">Publish</button>
</div>

<div class="table-container">
<table id="projectTable">
<thead>
<tr>
<th>Leader</th>
<th>Project</th>
<th>Members</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>
const SCRIPT_URL = 'YOUR_SCRIPT_URL_HERE';
const COURSE = 'buan4061';

let projects = [];

window.addEventListener('DOMContentLoaded', loadData);

async function loadData(){
    setStatus('Syncing...', 'syncing');
    try{
        const res = await fetch(`${SCRIPT_URL}?action=load&course=${COURSE}`);
        const json = await res.json();

        if(!json.ok) throw new Error(json.error);

        projects = json.projects;
        render();
        setStatus('Synced', 'success');
    }catch(e){
        console.error(e);
        setStatus('Error: ' + e.message, 'error');
    }finally{
        hideLoading();
    }
}

async function saveData(){
    setStatus('Saving...', 'syncing');
    try{
        const res = await fetch(`${SCRIPT_URL}?action=save&course=${COURSE}&data=${encodeURIComponent(JSON.stringify(projects))}`);
        const json = await res.json();

        if(!json.ok) throw new Error(json.error);

        render();
        setStatus('Saved', 'success');
    }catch(e){
        setStatus('Save failed', 'error');
    }
}

async function addProject(){
    const leader = leaderName.value.trim();
    const email = leaderEmail.value.trim();
    const name = projName.value.trim();
    const desc = projDesc.value.trim();

    if(!leader || !email || !name){
        alert('Missing fields');
        return;
    }

    projects.push({
        id: Date.now(),
        leader,
        leaderEmail: email,
        projectName: name,
        description: desc,
        members:[]
    });

    await saveData();
}

function render(){
    const tbody = document.querySelector('#projectTable tbody');
    tbody.innerHTML = '';

    projects.forEach(p=>{
        tbody.innerHTML += `
        <tr>
            <td>${p.leader}</td>
            <td>${p.projectName}</td>
            <td>${p.members.length}</td>
        </tr>`;
    });
}

function setStatus(msg, type=''){
    const el = document.getElementById('sync-status');
    if(!el) return;
    el.textContent = msg;
    el.className = type;
}

function hideLoading(){
    document.getElementById('loading-overlay').classList.add('hidden');
}
</script>

</body>
</html>
